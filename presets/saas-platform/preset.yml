schema_version: "1.0"

preset:
  id: "saas-platform"
  name: "Itexus SaaS Platform Preset"
  version: 0.4.1
  description: "Multi-tenancy, federated identity, and white-label overlay for Itexus spec-driven delivery"
  author: "itexus"
  repository: "https://github.com/sprivalov/itexus-spec-kit"
  license: "MIT"

requires:
  speckit_version: ">=0.5.0"

provides:
  templates:
    - type: "template"
      name: "saas-platform-domain-brief"
      file: "templates/domain-delivery-brief.md"
      description: "Structured SaaS platform context for specs and plans (tenancy, identity, isolation)"

  patterns:
    - type: "pattern"
      name: "multi-tenant-data-isolation"
      file: "patterns/multi-tenant-data-isolation.md"
      description: "Tenant isolation strategies: RLS, schema-per-tenant, and cache/queue boundaries"
    - type: "pattern"
      name: "federated-identity-oidc"
      file: "patterns/federated-identity-oidc.md"
      description: "OIDC/OAuth2, SSO, IdP federation, and token validation at the API edge"
    - type: "pattern"
      name: "white-label-theming-architecture"
      file: "patterns/white-label-theming-architecture.md"
      description: "BFF-served design tokens, feature flags per tenant, and branding isolation"

  design_patterns:
    - type: "design-pattern"
      name: "tenant-context-middleware"
      file: "design-patterns/tenant-context-middleware.md"
      description: "Resolve and propagate tenant context through HTTP, DB, cache, and messaging"

  anti_patterns:
    - type: "anti-pattern"
      name: "cross-tenant-data-leakage"
      file: "anti-patterns/cross-tenant-data-leakage.md"
      description: "Forbidden patterns that risk mixing tenant data across isolation boundaries"

tags:
  - "itexus"
  - "saas-platform"
  - "preset"
