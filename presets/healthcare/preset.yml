schema_version: "1.0"

preset:
  id: "healthcare"
  name: "Itexus Healthcare Preset"
  version: 0.2.2
  description: "Healthcare domain overlay for Itexus spec-driven delivery"
  author: "itexus"
  repository: "https://github.com/sprivalov/itexus-spec-kit"
  license: "MIT"

requires:
  speckit_version: ">=0.5.0"

provides:
  templates:
    - type: "template"
      name: "healthcare-domain-brief"
      file: "templates/domain-delivery-brief.md"
      description: "Structured healthcare context for specs and plans (PHI, audit, FHIR)"

  patterns:
    - type: "pattern"
      name: "fhir-facade"
      file: "patterns/fhir-facade.md"
      description: "Facade and ACL layer for safe FHIR interoperability"
    - type: "pattern"
      name: "zero-trust-phi-boundary"
      file: "patterns/zero-trust-phi-boundary.md"
      description: "Zero-trust controls around PHI access boundaries"

  design_patterns:
    - type: "design-pattern"
      name: "audit-decorator"
      file: "design-patterns/audit-decorator.md"
      description: "Decorator for HIPAA-compliant PHI data-access audit logging"
    - type: "design-pattern"
      name: "fhir-adapter"
      file: "design-patterns/fhir-adapter.md"
      description: "Anti-Corruption Layer translating domain models to/from FHIR"

  anti_patterns:
    - type: "anti-pattern"
      name: "logging-phi-data"
      file: "anti-patterns/logging-phi-data.md"
      description: "Strictly forbids logging patient identifiers in application logs"

tags:
  - "itexus"
  - "healthcare"
  - "preset"
