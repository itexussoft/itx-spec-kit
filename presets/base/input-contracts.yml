schema_version: "1.0"

phases:
  specify:
    required_inputs:
      - feature_request
      - constitutional_context
    optional_inputs:
      - domain_preset
      - prior_related_specs
    validation:
      - "feature_request is non-empty"
      - "constitutional_context includes active constitution.md"

  clarify:
    required_inputs:
      - spec_document
    optional_inputs:
      - stakeholder_answers
    validation:
      - "spec_document exists at specs/<feature>/spec.md"
      - "all required sections in spec are present"

  plan:
    required_inputs:
      - planning_context
      - selected_plan_template
      - constitution_rules
      - pattern_index
    optional_inputs:
      - spec_document
      - workflow_state
      - clarification_log
      - risk_history
    validation:
      - "for feature work, spec_document exists at specs/<feature>/spec.md"
      - "for brownfield work, workflow-state identifies work_class and artifact_root before planning begins"
      - "selected_plan_template in [system-design-plan-template.md, patch-plan-template.md, refactor-plan-template.md, bugfix-report-template.md, migration-plan-template.md, spike-note-template.md, modify-plan-template.md, hotfix-report-template.md, deprecate-plan-template.md]"
      - "plan includes required sections for chosen tier"
      - "when work class requires traceability, plan frontmatter includes traceability_mode plus matching id"

  tasks:
    required_inputs:
      - approved_plan
    optional_inputs:
      - task_template
      - implementation_constraints
    validation:
      - "tasks.md required only for work classes with task_policy: required (feature, migration, deprecate, and legacy patch path)"
      - "if tasks.md exists, each task references plan section and the active traceability reference id (as applicable)"

  implement:
    required_inputs:
      - plan_document
      - repository_state
    optional_inputs:
      - tasks_document
      - test_fixtures
      - mocks
    validation:
      - "at least one unchecked task exists before implementation start only when task_policy: required or tasks.md is present"
      - "working tree clean or changes attributable to current workstream branch"

  review:
    required_inputs:
      - implementation_diff
      - gate_feedback
      - test_results
    optional_inputs:
      - reviewer_notes
    validation:
      - "after_implement gate passed or findings recorded"
      - "all Tier 2 findings resolved or explicitly escalated"

  deliver:
    required_inputs:
      - done_report
      - pr_link
      - final_gate_feedback
    optional_inputs:
      - release_notes
    validation:
      - "done_report exists and all required sections filled"
      - "PR created and merge state is awaiting human action"

cross_phase_rules:
  - id: state-file-required
    description: "Workflow state must be persisted after each phase transition"
    applies_to: [specify, clarify, plan, tasks, implement, review, deliver]
  - id: assumptions-log-required
    description: "Any inferred value must be logged as an explicit assumption"
    applies_to: [clarify, plan, implement, review]
  - id: decision-log-required
    description: "Authority-based decisions must be appended to decision log"
    applies_to: [plan, implement, review, deliver]

work_class_artifact_contracts:
  feature:
    required_artifacts:
      - "spec.md"
      - "system-design-plan.md"
      - "tasks.md"
    validation:
      - "work_class maps to feature policy"
  refactor:
    required_artifacts:
      - "refactor-plan.md"
    optional_artifacts:
      - "tasks.md"
    validation:
      - "work_class maps to refactor policy"
      - "tasks.md may be omitted for scoped refactor changes"
  bugfix:
    required_artifacts:
      - "bugfix-report.md"
    optional_artifacts:
      - "tasks.md"
    validation:
      - "work_class maps to bugfix policy"
      - "tasks.md may be omitted for single-path bugfixes"
  migration:
    required_artifacts:
      - "migration-plan.md"
      - "tasks.md"
    validation:
      - "work_class maps to migration policy"
      - "migration plan declares compatibility window and rollback strategy"
  spike:
    required_artifacts:
      - "spike-note.md"
    validation:
      - "work_class maps to spike policy"
      - "tasks.md may be omitted for exploratory work"
  modify:
    required_artifacts:
      - "modify-plan.md"
    optional_artifacts:
      - "tasks.md"
    validation:
      - "work_class maps to modify policy"
      - "impact analysis and regression testing sections are present in plan"
  hotfix:
    required_artifacts:
      - "hotfix-report.md"
    optional_artifacts:
      - "tasks.md"
    validation:
      - "work_class maps to hotfix policy"
      - "incident traceability is declared in plan frontmatter"
  deprecate:
    required_artifacts:
      - "deprecate-plan.md"
      - "tasks.md"
    validation:
      - "work_class maps to deprecate policy"
      - "plan documents phased compatibility and removal path"
      - "plan includes dependency impact and consumer rollout details"

legacy_compatibility:
  plan_filename_work_class:
    system-design-plan.md: feature
    patch-plan.md: patch

gate:
  auto_retry:
    max_attempts: 3
    correction_artifact: ".specify/context/gate-failure-report.md"
    correction_tag: "<SYSTEM_CORRECTION>"
