# Shared policy manifest — single source of truth for plan tier rules.
# Consumed by orchestrator.py at runtime. Referenced by templates and constitution.

plan_tiers:
  system:
    match_filename: "system-design-plan"
    mandatory_sections:
      - "## 4. Architectural Patterns Applied"
      - "## 4b. Code-Level Design Patterns Applied"
      - "## 5. DDD Aggregates"
      - "## 13. Test Strategy"
    pattern_selection: required

  patch:
    match_filename: "patch-plan"
    mandatory_sections:
      - "## 1. Problem Statement"
      - "## 2. Files / Modules Affected"
    pattern_selection: optional

placeholder_markers:
  - "_e.g.,"
  - "e.g.,"
  - "MANDATORY"

gate:
  default_max_tier1_retries: 3
  heuristic_retry_escalates: false

rules:
  e2e-test-presence:
