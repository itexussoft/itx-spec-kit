# Shared policy manifest — single source of truth for work-class rules.
# Consumed by orchestrator.py at runtime. Referenced by templates and constitution.

# Wave A canonical policy model.
work_classes:
  feature:
    allowed_templates:
      - "system-design-plan-template.md"
    mandatory_sections:
      - "## 4. Architectural Patterns Applied"
      - "## 4b. Code-Level Design Patterns Applied"
      - "## 5. DDD Aggregates"
      - "## 13. Test Strategy"
    pattern_selection: required
    task_policy: required
    testing_expectation: e2e-required
    gate_profile: feature-strict
  patch:
    allowed_templates:
      - "patch-plan-template.md"
    mandatory_sections:
      - "## 1. Problem Statement"
      - "## 2. Files / Modules Affected"
    pattern_selection: optional
    task_policy: required
    testing_expectation: regression-required
    gate_profile: patch-safe
  refactor:
    allowed_templates:
      - "refactor-plan-template.md"
    mandatory_sections:
      - "## 1. Goal"
      - "## 2. Scope / Non-Scope"
      - "## 3. Invariants to Preserve"
      - "## 4. Public Contract Impact"
      - "## 5. Behavioral Equivalence Strategy"
      - "## 6. Regression Strategy"
    pattern_selection: optional
    task_policy: optional
    testing_expectation: regression-required
    gate_profile: refactor-safe
  bugfix:
    allowed_templates:
      - "bugfix-report-template.md"
    mandatory_sections:
      - "## 1. Symptom"
      - "## 2. Reproduction"
      - "## 3. Expected Behavior"
      - "## 4. Regression Test Target"
      - "## 5. Root Cause"
      - "## 6. Fix Strategy"
    pattern_selection: optional
    task_policy: optional
    testing_expectation: regression-required
    gate_profile: bugfix-fast
  migration:
    allowed_templates:
      - "system-design-plan-template.md"
      - "patch-plan-template.md"
    mandatory_sections:
      - "## 4. Architectural Patterns Applied"
      - "## 4b. Code-Level Design Patterns Applied"
      - "## 5. DDD Aggregates"
      - "## 13. Test Strategy"
    pattern_selection: required
    task_policy: required
    testing_expectation: e2e-required
    gate_profile: feature-strict
  tooling:
    allowed_templates:
      - "patch-plan-template.md"
    mandatory_sections:
      - "## 1. Problem Statement"
      - "## 2. Files / Modules Affected"
    pattern_selection: optional
    task_policy: required
    testing_expectation: regression-required
    gate_profile: patch-safe
  spike:
    allowed_templates:
      - "patch-plan-template.md"
    mandatory_sections:
      - "## 1. Problem Statement"
      - "## 2. Files / Modules Affected"
    pattern_selection: optional
    task_policy: optional
    testing_expectation: advisory
    gate_profile: spike-light

# Compatibility map used when frontmatter metadata is absent or invalid.
legacy_plan_filename_work_class:
  system-design-plan: feature
  patch-plan: patch

# Legacy compatibility alias kept for pre-Wave-A consumers.
plan_tiers:
  system:
    match_filename: "system-design-plan"
    mandatory_sections:
      - "## 4. Architectural Patterns Applied"
      - "## 4b. Code-Level Design Patterns Applied"
      - "## 5. DDD Aggregates"
      - "## 13. Test Strategy"
    pattern_selection: required

  patch:
    match_filename: "patch-plan"
    mandatory_sections:
      - "## 1. Problem Statement"
      - "## 2. Files / Modules Affected"
    pattern_selection: optional

placeholder_markers:
  - "_e.g.,"
  - "e.g.,"
  - "MANDATORY"

gate:
  default_max_tier1_retries: 3
  heuristic_retry_escalates: false

