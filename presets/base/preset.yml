schema_version: "1.0"

preset:
  id: "base"
  name: "Itexus Base Preset"
  version: 0.4.1
  description: "Base constitution and spec template overrides for Itexus projects"
  author: "itexus"
  repository: "https://github.com/sprivalov/itexus-spec-kit"
  license: "MIT"

requires:
  speckit_version: ">=0.5.0"

provides:
  templates:
    - type: "template"
      name: "spec-template"
      file: "templates/spec-template.md"
      description: "Itexus feature specification template"
      replaces: "spec-template"

    - type: "template"
      name: "system-design-plan"
      file: "templates/system-design-plan-template.md"
      description: "Mandatory template for the /speckit.plan phase — requires explicit pattern and aggregate declarations"

    - type: "template"
      name: "architecture-decision-record"
      file: "templates/architecture-decision-record-template.md"
      description: "Standard ADR format linking decisions to architectural patterns"

    - type: "template"
      name: "patch-plan"
      file: "templates/patch-plan-template.md"
      description: "Lightweight plan template for scoped patch-level changes"

    - type: "template"
      name: "refactor-plan"
      file: "templates/refactor-plan-template.md"
      description: "Refactor-focused plan template for behavior-preserving structural changes"

    - type: "template"
      name: "bugfix-report"
      file: "templates/bugfix-report-template.md"
      description: "Bugfix-focused report template for reproduction, root cause, and fix strategy"

    - type: "template"
      name: "migration-plan"
      file: "templates/migration-plan-template.md"
      description: "Migration-focused plan template for phased technical transitions"

    - type: "template"
      name: "spike-note"
      file: "templates/spike-note-template.md"
      description: "Exploratory note template for short research spikes"

    - type: "template"
      name: "modify-plan"
      file: "templates/modify-plan-template.md"
      description: "Behavior-change plan template for scoped modifications to existing functionality"

    - type: "template"
      name: "hotfix-report"
      file: "templates/hotfix-report-template.md"
      description: "Incident-linked report template for urgent and minimal hotfix delivery"

    - type: "template"
      name: "deprecate-plan"
      file: "templates/deprecate-plan-template.md"
      description: "Deprecation plan template with dependency-impact and phased rollout tracking"

    - type: "template"
      name: "execution-brief"
      file: "templates/execution-brief-template.md"
      description: "Compact execution brief template refreshed by gate flows for agent-facing context"

    - type: "template"
      name: "test-strategy"
      file: "templates/test-strategy-template.md"
      description: "Standalone test strategy document for feature or project scope"

    - type: "template"
      name: "qa-checklist"
      file: "templates/qa-checklist-template.md"
      description: "QA checklist for reviewing AI-generated implementation code"

    - type: "template"
      name: "done-report"
      file: "templates/done-report-template.md"
      description: "Completion report template for delivery traceability and merge handoff"

  patterns:
    - type: "pattern"
      name: "foundational-principles"
      file: "patterns/foundational-principles.md"
      description: "KISS, YAGNI, DRY, SOLID, and Separation of Concerns as AI-first design principles"
    - type: "pattern"
      name: "domain-driven-design"
      file: "patterns/domain-driven-design.md"
      description: "Bounded Contexts, Aggregates, Entities, and Value Objects"
    - type: "pattern"
      name: "hexagonal-architecture"
      file: "patterns/hexagonal-architecture.md"
      description: "Ports-and-adapters architecture to isolate domain logic"
    - type: "pattern"
      name: "clean-architecture"
      file: "patterns/clean-architecture.md"
      description: "Dependency rule and use-case oriented architecture"
    - type: "pattern"
      name: "modular-monolith"
      file: "patterns/modular-monolith.md"
      description: "Strong module boundaries inside a monolithic deployment"
    - type: "pattern"
      name: "event-driven-microservices"
      file: "patterns/event-driven-microservices.md"
      description: "Asynchronous event-based integration across services"
    - type: "pattern"
      name: "transactional-outbox"
      file: "patterns/transactional-outbox.md"
      description: "Reliable event publishing using transactional outbox"
    - type: "pattern"
      name: "e2e-testing-strategy"
      file: "patterns/e2e-testing-strategy.md"
      description: "E2E testing rules: one test per journey, containers over mocks, naming conventions"
    - type: "pattern"
      name: "cli-orchestrator-architecture"
      file: "patterns/cli-orchestrator-architecture.md"
      description: "AI-first architecture for CLI tools, workflow engines, and automation scripts"
    - type: "pattern"
      name: "asynchronous-event-loop-architecture"
      file: "patterns/asynchronous-event-loop-architecture.md"
      description: "Single-process asyncio daemons for concurrent I/O integration (log watch, chat, HTTP sidecars)"

  design_patterns:
    - type: "design-pattern"
      name: "value-object-and-result-monad"
      file: "design-patterns/value-object-and-result-monad.md"
      description: "DDD Value Objects and Result Monad error handling over exceptions"
    - type: "design-pattern"
      name: "strategy-and-composition"
      file: "design-patterns/strategy-and-composition.md"
      description: "Strategy pattern to eliminate conditional chains; composition over inheritance"
    - type: "design-pattern"
      name: "command-and-handler"
      file: "design-patterns/command-and-handler.md"
      description: "Command pattern as the tactical foundation for mutations, CQRS, and messaging"
    - type: "design-pattern"
      name: "adapter-anti-corruption"
      file: "design-patterns/adapter-anti-corruption.md"
      description: "Adapters and ACLs to isolate the domain from external systems"
    - type: "design-pattern"
      name: "decorator-middleware"
      file: "design-patterns/decorator-middleware.md"
      description: "Decorators and middleware pipelines for cross-cutting concerns"
    - type: "design-pattern"
      name: "state-machine-pattern"
      file: "design-patterns/state-machine-pattern.md"
      description: "Explicit state machines for complex entity lifecycles"
    - type: "design-pattern"
      name: "builder-for-immutability"
      file: "design-patterns/builder-for-immutability.md"
      description: "Builders to construct complex immutable DDD Aggregates"

  anti_patterns:
    - type: "anti-pattern"
      name: "primitive-obsession"
      file: "anti-patterns/primitive-obsession.md"
      description: "Forbids raw strings/ints for domain concepts"
    - type: "anti-pattern"
      name: "anemic-domain-model"
      file: "anti-patterns/anemic-domain-model.md"
      description: "Forbids pure data classes with externalized logic"
    - type: "anti-pattern"
      name: "manual-singleton"
      file: "anti-patterns/manual-singleton.md"
      description: "Strictly forbids manual Singleton; enforces DI/IoC"
    - type: "anti-pattern"
      name: "template-method-inheritance"
      file: "anti-patterns/template-method-inheritance.md"
      description: "Warns against deep inheritance; enforces Strategy/HOF"
    - type: "anti-pattern"
      name: "visitor-boilerplate"
      file: "anti-patterns/visitor-boilerplate.md"
      description: "Forbids classic Visitor; enforces native pattern matching"
    - type: "anti-pattern"
      name: "over-engineered-cli"
      file: "anti-patterns/over-engineered-cli.md"
      description: "Forbids applying DDD/Hexagonal enterprise patterns to tool-class projects"

tags:
  - "itexus"
  - "base"
  - "preset"
