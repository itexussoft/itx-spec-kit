schema_version: "1.0"

preset:
  id: "procurement-guarantees"
  name: "Itexus Procurement Guarantees Preset"
  version: 0.4.1
  description: "Procurement, demand-guarantee, and surety platform overlay for Itexus spec-driven delivery"
  author: "itexus"
  repository: "https://github.com/sprivalov/itexus-spec-kit"
  license: "MIT"

requires:
  speckit_version: ">=0.5.0"

provides:
  templates:
    - type: "template"
      name: "procurement-guarantees-domain-brief"
      file: "templates/domain-delivery-brief.md"
      description: "Structured procurement-guarantees context for specs and plans (products, lifecycle, evidence, issuer network)"

  patterns:
    - type: "pattern"
      name: "canonical-undertaking-message-taxonomy"
      file: "patterns/canonical-undertaking-message-taxonomy.md"
      description: "Canonical message families and status semantics for issuance, amendment, demand, termination, and status reporting"
    - type: "pattern"
      name: "service-domain-semantics-and-contracts"
      file: "patterns/service-domain-semantics-and-contracts.md"
      description: "Capability-aligned service domains, business scenarios, and stable semantic APIs for guarantee platforms"
    - type: "pattern"
      name: "configurable-flow-metamodel"
      file: "patterns/configurable-flow-metamodel.md"
      description: "Product-template and versioning model for bid bonds, performance guarantees, advance-payment guarantees, and adjacent instruments"
    - type: "pattern"
      name: "dual-state-machine-application-track"
      file: "patterns/dual-state-machine-application-track.md"
      description: "Separate lifecycle for customer application and issued undertaking with deterministic aggregation and claim handling"
    - type: "pattern"
      name: "snapshot-evidence-boundary"
      file: "patterns/snapshot-evidence-boundary.md"
      description: "Immutable evidence, version history, and presentation packages across issuance, amendment, claim, and release"
    - type: "pattern"
      name: "organization-anchor-and-rls-boundary"
      file: "patterns/organization-anchor-and-rls-boundary.md"
      description: "Party-anchor, data ownership, and scoped visibility for applicant, beneficiary, issuer, surety, and broker actors"
    - type: "pattern"
      name: "partner-gateway-security"
      file: "patterns/partner-gateway-security.md"
      description: "Secure issuer, broker, beneficiary, and bank-network integration using signed APIs and message adapters"
    - type: "pattern"
      name: "exposure-ledger-and-limit-management"
      file: "patterns/exposure-ledger-and-limit-management.md"
      description: "Exposure, facility, collateral, and utilization model for outstanding guarantee obligations"

  design_patterns:
    - type: "design-pattern"
      name: "transition-guard-command-handler"
      file: "design-patterns/transition-guard-command-handler.md"
      description: "Command handlers that own legal lifecycle transitions, side effects, and evidence creation"
    - type: "design-pattern"
      name: "step-up-action-guard"
      file: "design-patterns/step-up-action-guard.md"
      description: "High-risk user actions protected by step-up MFA and explicit authorization checks"
    - type: "design-pattern"
      name: "document-evidence-decorator"
      file: "design-patterns/document-evidence-decorator.md"
      description: "Decorator pipeline for upload, version, sign, verify, claim-package, and audit actions on documents"
    - type: "design-pattern"
      name: "provider-capability-strategy"
      file: "design-patterns/provider-capability-strategy.md"
      description: "Strategy object per issuer or surety capability set instead of hardcoded provider branches"
    - type: "design-pattern"
      name: "presentation-examination-policy"
      file: "design-patterns/presentation-examination-policy.md"
      description: "Policy object for compliant examination of claims, demands, amendments, and release requests"

  anti_patterns:
    - type: "anti-pattern"
      name: "hardcoded-flow-by-law-or-bank"
      file: "anti-patterns/hardcoded-flow-by-law-or-bank.md"
      description: "Forbids hardcoding country-specific law variants or bank-specific branches into core services"
    - type: "anti-pattern"
      name: "implicit-status-bypass"
      file: "anti-patterns/implicit-status-bypass.md"
      description: "Forbids direct mutation of application and track statuses outside transition guards"
    - type: "anti-pattern"
      name: "silent-api-manual-fallback"
      file: "anti-patterns/silent-api-manual-fallback.md"
      description: "Forbids hidden mode switches from API to MANUAL when partner delivery fails"
    - type: "anti-pattern"
      name: "cross-organization-access-leakage"
      file: "anti-patterns/cross-organization-access-leakage.md"
      description: "Forbids cross-organization data and document visibility leaks"
    - type: "anti-pattern"
      name: "physical-delete-or-history-overwrite"
      file: "anti-patterns/physical-delete-or-history-overwrite.md"
      description: "Forbids destructive delete or overwrite of runtime history, snapshots, and document versions"
    - type: "anti-pattern"
      name: "scoring-as-bank-decision"
      file: "anti-patterns/scoring-as-bank-decision.md"
      description: "Forbids treating platform scoring as a bank decision or accepted offer"
    - type: "anti-pattern"
      name: "provider-coupled-core-domain"
      file: "anti-patterns/provider-coupled-core-domain.md"
      description: "Forbids leaking SWIFT fields, insurer payloads, or surety provider DTOs into the core domain model"

tags:
  - "itexus"
  - "procurement-guarantees"
  - "preset"
